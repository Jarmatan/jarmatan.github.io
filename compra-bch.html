<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="utf-8">
<title>Comprar el libro – La Venganza de Mercurio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Georgia, serif;
  margin: 0;
  padding: 0;
  background: url('portadaWEB.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #111;
}

.titulo-principal {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  margin: 2em auto 1em auto;
  color: #fff;
}

.bloque {
  background-color: rgba(240,240,240,0.9);
  margin: 1.2em auto;
  padding: 1em;
  border-radius: 12px;
  max-width: 600px;
}

/* BOTÓN TIPO INDEX */
.boton-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 1em auto;
  padding: 18px;
  background-color: rgba(200,200,200,0.9);
  border-radius: 14px;
  max-width: 260px;
}

.qr-boton {
  display: block;
  max-width: 220px;
  padding: 12px;
  background: linear-gradient(to bottom, #ffffff, #e4e4e4);
  border-radius: 14px;
  border: 1px solid #aaa;
  cursor: pointer;

  box-shadow:
    6px 6px 10px rgba(0,0,0,0.45),
    0 0 8px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.3);

  transition: all 0.15s ease;
}

.qr-boton img {
  width: 100%;
  display: block;
  pointer-events: none;
}

.qr-boton:active {
  transform: translate(4px, 4px);
  box-shadow:
    2px 2px 5px rgba(0,0,0,0.3),
    0 0 5px rgba(0,0,0,0.18);
}

.formulario {
  background-color: rgba(240,240,240,0.9);
  margin: 1.5em auto;
  padding: 1em;
  border-radius: 12px;
  max-width: 600px;
}

.formulario input,
.formulario select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 220px;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 18px;
}

.direccion-envio {
  display: none;
}
</style>

<script>

const BCH_ADDRESS = "TU_DIRECCION_BCH_AQUI";
const EMAIL_CONTACTO = "lavenganzademercurio@gmail.com";
const EUR_TO_BCH = 0.0025;

let precioEUR = 0;
let precioBCH = 0;

function generarPedidoID() {
  return 'MERC-' + Date.now();
}

function obtenerFechaHora() {
  return new Date().toLocaleString();
}

function copiarDireccion() {
  navigator.clipboard.writeText(BCH_ADDRESS);
  alert("Dirección copiada. Ahora puedes pegarla en tu cartera.");
}

function actualizarPrecio() {

  const formato = document.getElementById("formato").value;

  if(formato === "ebook") precioEUR = 5;
  if(formato === "blanda") precioEUR = 15;
  if(formato === "dura") precioEUR = 20;

  if(precioEUR > 0){
    precioBCH = (precioEUR * EUR_TO_BCH + Math.random() * 0.00001).toFixed(6);

    document.getElementById("precioInfo").innerHTML =
      `<strong>${precioEUR} € ≈ ${precioBCH} BCH</strong><br>(Gastos de envío incluidos)`;
  }

}

function actualizarCamposEnvio() {

  const formato = document.getElementById("formato").value;
  const envio = document.getElementById("direccionEnvio");

  envio.style.display = (formato === "blanda" || formato === "dura") ? "block" : "none";

  actualizarPrecio();
}

function generarMensaje() {

  const pedido = document.getElementById("pedidoInput").value;
  const fecha = document.getElementById("fechaPedido").value;

  const formato = document.getElementById("formato").value;
  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;

  const direccion = document.getElementById("direccion").value;
  const ciudad = document.getElementById("ciudad").value;
  const postal = document.getElementById("postal").value;
  const pais = document.getElementById("pais").value;

  let mensaje =
`Pedido libro "La Venganza de Mercurio"

ID de pedido:
${pedido}

Fecha y hora:
${fecha}

Formato:
${formato}

Importe exacto enviado:
${precioBCH} BCH

Equivalente:
${precioEUR} €

Nombre:
${nombre}

Email:
${email}

`;

  if(formato === "blanda" || formato === "dura") {

    mensaje +=
`Dirección de envío:
${direccion}
${ciudad}
${postal}
${pais}

`;

  }

  mensaje += `Dirección BCH:
${BCH_ADDRESS}`;

  document.getElementById("mensajePedido").value = mensaje;
}

function copiarMensaje() {

  const texto = document.getElementById("mensajePedido");
  texto.select();
  document.execCommand("copy");

  alert("Mensaje copiado. Envíalo a: " + EMAIL_CONTACTO);
}

window.onload = function() {

  document.getElementById("pedidoInput").value = generarPedidoID();
  document.getElementById("fechaPedido").value = obtenerFechaHora();

}

</script>

</head>

<body>

<div class="titulo-principal">
Comprar el libro – La Venganza de Mercurio
</div>

<div class="bloque">
<p>
Elija el formato del libro. El precio en BCH se calculará automáticamente.<br><br>
Todos los precios incluyen gastos de envío.
</p>

<p id="precioInfo" style="text-align:center; font-size:20px;">
—
</p>

</div>

<div class="bloque">
<p>
Pulse el botón para copiar la dirección de pago y pegarla en su cartera.<br>
También puede escanear el código si lo prefiere.
</p>
</div>

<div class="boton-wrapper">
  <div class="qr-boton" onclick="copiarDireccion()">
    <img src="QR-BCH.jpg" alt="QR Bitcoin Cash">
  </div>
</div>

<div class="formulario">

<input type="hidden" id="pedidoInput">
<input type="hidden" id="fechaPedido">

<label>Formato</label>
<select id="formato" onchange="actualizarCamposEnvio()" required>
<option value="">Seleccione</option>
<option value="ebook">eBook (5€)</option>
<option value="blanda">Tapa blanda (15€)</option>
<option value="dura">Tapa dura (20€)</option>
</select>

<label>Nombre</label>
<input type="text" id="nombre">

<label>Email</label>
<input type="email" id="email">

<div id="direccionEnvio" class="direccion-envio">

<label>Dirección</label>
<input type="text" id="direccion">

<label>Ciudad</label>
<input type="text" id="ciudad">

<label>Código postal</label>
<input type="text" id="postal">

<label>País</label>
<input type="text" id="pais">

</div>

<button onclick="generarMensaje()">
Comprar con Bitcoin Cash (BCH)
</button>

<textarea id="mensajePedido"></textarea>

<button onclick="copiarMensaje()">
Copiar mensaje
</button>

</div>

</body>
</html>
