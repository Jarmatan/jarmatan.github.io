<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="utf-8">
<title>Comprar – La Venganza de Mercurio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="estilos.css">
<script src="funciones.js" defer></script>
</head>

<body>

<div class="titulo-principal">
Comprar el libro – La Venganza de Mercurio
</div>

<div class="bloque">
<p><strong>1. Elija el formato</strong></p>

<select id="formato" name="Formato" onchange="actualizarCamposEnvio()" required>
<option value="">Seleccione</option>
<option value="eBook (5€)">eBook (5€)</option>
<option value="Tapa blanda (17€)">Tapa blanda (17€)</option>
<option value="Tapa dura (20€)">Tapa dura (20€)</option>
</select>

</div>

<div class="bloque">
<p><strong>2. Realice el pago</strong></p>
<p>Escanee o copie la dirección BCH.</p>
</div>

<div class="boton-wrapper">
<div class="qr-boton" onclick="copiarDireccion()">
<img src="img/QR-BCH.jpg" alt="QR BCH">
<div id="feedbackQR" style="position:absolute; bottom:50%; width:100%; text-align:center; font-size:14px; color:green; opacity:0; transition: opacity 0.3s ease;">
Dirección copiada
</div>
</div>
</div>

<form class="formulario"
action="https://formsubmit.co/lavenganzademercurio@gmail.com"
method="POST"
onsubmit="return prepararEnvio()">

<input type="hidden" name="_subject" value="Pedido - La Venganza de Mercurio">
<input type="hidden" name="_captcha" value="false">

<input type="hidden" name="_next" value="https://jarmatan.github.io/Pruebas/gracias.html">

<input type="hidden" id="pedidoInput" name="ID de pedido">
<input type="hidden" id="fechaPedido" name="Fecha">

<label>Nombre</label>
<input type="text" id="nombre" name="Nombre" required>

<label>Email</label>
<input type="email" id="email" name="Email" required>

<div id="direccionEnvio" class="direccion-envio">

<label>Dirección</label>
<input type="text" id="direccion" name="Dirección">

<label>Ciudad</label>
<input type="text" id="ciudad" name="Ciudad">

<label>Provincia</label>
<input type="text" id="provincia" name="Provincia">

<label>Código postal</label>
<input type="text" id="postal" name="Código postal">

<label>País</label>
<input type="text" id="pais" name="País">

<label>Teléfono</label>
<input type="text" id="telefono" name="Teléfono">

</div>

<button class="boton-formulario" type="submit">
Enviar pedido
</button>

</form>

<script>
// Función para copiar la dirección BCH al portapapeles y mostrar feedback
function copiarDireccion() {
  const direccion = "bitcoincash:qr9wxyz..."; // reemplazar con la real
  navigator.clipboard.writeText(direccion).then(() => {
    const feedback = document.getElementById('feedbackQR');
    feedback.style.opacity = '1';
    setTimeout(() => feedback.style.opacity = '0', 1000); // se oculta automáticamente
  });
}

// Función para actualizar colores según formato
function actualizarCamposEnvio() {
  const select = document.getElementById('formato');
  const valor = select.value;
  let color = '';
  if (valor.includes('eBook')) color = 'green';
  else if (valor.includes('Tapa blanda')) color = 'blue';
  else if (valor.includes('Tapa dura')) color = 'yellow';
  select.style.backgroundColor = color;
  document.getElementById('direccionEnvio').style.display = valor.includes('eBook') ? 'none' : 'block';
}
</script>

</body>
</html>
