<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="utf-8">
<title>Comprar el libro – La Venganza de Mercurio<br>con Bitcoin Cash (BCH)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Georgia, serif;
  margin: 0;
  padding: 0;
  background: url('portadaWEB.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #111;
}

.titulo-principal {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  margin: 2em auto 1em auto;
  color: #fff;
  line-height: 1.3em;
}

.bloque {
  background-color: rgba(240,240,240,0.9);
  margin: 1.2em auto;
  padding: 1.2em;
  border-radius: 12px;
  max-width: 600px;
  line-height: 1.5em;
}

.boton-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 1em auto;
  background-color: rgba(200,200,200,0.9);
  border-radius: 14px;
  max-width: 260px;
  position: relative;
  padding: 18px;
}

.qr-boton {
  display: block;
  max-width: 220px;
  background: linear-gradient(to bottom, #ffffff, #e4e4e4);
  border-radius: 14px;
  border: 1px solid #aaa;
  cursor: pointer;
  box-shadow:
    6px 6px 10px rgba(0,0,0,0.45),
    0 0 8px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.3);
  text-align: center;
  margin: 0 auto;
  padding: 12px;
}

.qr-boton img {
  width: 100%;
  display: block;
}

#feedbackQR {
  position: absolute;
  bottom: 8px;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 14px;
  color: green;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#feedbackQR.visible {
  opacity: 1;
}

.formulario {
  background-color: rgba(240,240,240,0.9);
  margin: 1.5em auto;
  padding: 1em;
  border-radius: 12px;
  max-width: 600px;
}

.formulario input,
.formulario select,
textarea {
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
  background-color: #fff;
  transition: all 0.3s ease;
  background-clip: padding-box; /* 🔴 importante */
}

textarea {
  height: 220px;
  margin: 10px 0;
}

.boton-formulario {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  margin-top: 8px;
  cursor: pointer;
  background: linear-gradient(to bottom, #ffffff, #e4e4e4);
  border-radius: 14px;
  border: 1px solid #aaa;
  box-shadow:
    6px 6px 10px rgba(0,0,0,0.45),
    0 0 8px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.3);
  height: 70px;
}

.direccion-envio {
  display: none;
}
</style>

<script>
const BCH_ADDRESS = "bitcoincash:qzzvgukpd9f5pas6hvr98vsnpwqnak7rxqt65yuwa5";
const EMAIL_CONTACTO = "lavenganzademercurio@gmail.com";
const PRECIOS = { ebook: 5, blanda: 17, dura: 20 };

const COLORES_FORMATO = {
  ebook: "#66cc66",
  blanda: "#3366ff",
  dura: "#ffcc33"
};

function generarPedidoID() {
  return 'MERC-' + Date.now();
}

function obtenerFechaHora() {
  return new Date().toLocaleString();
}

function copiarDireccion() {
  navigator.clipboard.writeText(BCH_ADDRESS).then(() => {
    const feedback = document.getElementById("feedbackQR");
    feedback.classList.add("visible");
    setTimeout(() => {
      feedback.classList.remove("visible");
    }, 2000);
  });
}

function copiarEmail() {
  navigator.clipboard.writeText(EMAIL_CONTACTO);
  alert("Email copiado: " + EMAIL_CONTACTO);
}

function actualizarCamposEnvio() {
  const formato = document.getElementById("formato").value;
  const envio = document.getElementById("direccionEnvio");

  envio.style.display = (formato === "blanda" || formato === "dura") ? "block" : "none";

  document.getElementById("formatoPedido").value =
    `${formato} ${PRECIOS[formato] || ''}€`;

  document.getElementById("formato").style.backgroundColor =
    formato ? COLORES_FORMATO[formato] : "#fff";

  actualizarColoresCampos();
}

/* 🔴 SOLUCIÓN DEFINITIVA */
function actualizarColoresCampos() {
  const formato = document.getElementById("formato").value;
  const color = COLORES_FORMATO[formato];

  document.querySelectorAll(".formulario input, .formulario textarea")
    .forEach(campo => {

      if (campo.value.trim() !== "" && color) {
        campo.style.backgroundColor = "#fff";
        campo.style.boxShadow = `inset 0 0 0 1000px ${color}`;
      } else {
        campo.style.backgroundColor = "#fff";
        campo.style.boxShadow = "none";
      }

    });
}

function generarMensaje() {
  const pedido = document.getElementById("pedidoInput").value;
  const fecha = document.getElementById("fechaPedido").value;
  const formato = document.getElementById("formatoPedido").value;

  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;

  const direccion = document.getElementById("direccion").value;
  const ciudad = document.getElementById("ciudad").value;
  const postal = document.getElementById("postal").value;
  const pais = document.getElementById("pais").value;

  let mensaje = `Pedido libro "La Venganza de Mercurio"

ID de pedido:
${pedido}

Fecha y hora:
${fecha}

Formato y precio:
${formato}

Nombre:
${nombre}

Email:
${email}
`;

  if(formato.includes("blanda") || formato.includes("dura")) {
    mensaje += `Dirección de envío:
${direccion}
${ciudad}
${postal}
${pais}
`;
  }

  document.getElementById("mensajePedido").value = mensaje;
  actualizarColoresCampos();
}

function copiarMensaje() {
  const texto = document.getElementById("mensajePedido");
  texto.select();
  document.execCommand("copy");
  alert("Mensaje copiado. Envíalo a: " + EMAIL_CONTACTO);
}

window.onload = function() {
  document.getElementById("pedidoInput").value = generarPedidoID();
  document.getElementById("fechaPedido").value = obtenerFechaHora();

  document.querySelectorAll(".formulario input, .formulario textarea")
    .forEach(campo => {
      campo.addEventListener("input", actualizarColoresCampos);
    });
};
</script>

</head>

<body>

<div class="titulo-principal">
Comprar el libro – La Venganza de Mercurio<br>
con Bitcoin Cash (BCH)
</div>

<div class="bloque">
<p><strong>1. Elija el formato del libro</strong></p>
<select id="formato" onchange="actualizarCamposEnvio()" required>
<option value="">Seleccione</option>
<option value="ebook">eBook (5€)</option>
<option value="blanda">Tapa blanda (17€)</option>
<option value="dura">Tapa dura (20€)</option>
</select>
<p>Todos los precios incluyen gastos de envío.</p>
</div>

<div class="bloque">
<p><strong>2. Realice el pago</strong></p>
<p>Pulse sobre el código QR para copiar la dirección.</p>
</div>

<div class="boton-wrapper">
  <div class="qr-boton" onclick="copiarDireccion()">
    <img src="QR-BCH.jpg">
  </div>
  <div id="feedbackQR">Dirección copiada</div>
</div>

<div class="bloque">
<p><strong>3. Envíe su pedido</strong></p>
</div>

<div class="formulario">

<input type="hidden" id="pedidoInput">
<input type="hidden" id="fechaPedido">
<input type="hidden" id="formatoPedido">

<label>Nombre</label>
<input type="text" id="nombre">

<label>Email</label>
<input type="email" id="email">

<div id="direccionEnvio" class="direccion-envio">
<label>Dirección</label>
<input type="text" id="direccion">
<label>Ciudad</label>
<input type="text" id="ciudad">
<label>Código postal</label>
<input type="text" id="postal">
<label>País</label>
<input type="text" id="pais">
</div>

<button class="boton-formulario" onclick="generarMensaje()">Pulse aquí para generar el pedido</button>
<textarea id="mensajePedido"></textarea>
<button class="boton-formulario" onclick="copiarMensaje()">Puse aquí para copiar el pedido</button>
<button class="boton-formulario" onclick="copiarEmail()">
Pulse aquí para copiar la dirección<br>
lavenganzademercurio@gmail.com
</button>

</div>

</body>
</html>
