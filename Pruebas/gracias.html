<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido recibido</title>
<link rel="stylesheet" href="estilos.css">

<style>
/* Ajustes específicos para la página de gracias */
.bloque {
  text-align: center;
}

.bloque h2 {
  font-size: 34px;
  margin-bottom: 1em;
}

.bloque p {
  font-size: 20px;
  line-height: 1.6;
  margin: 0.6em 0;
}

.bloque a {
  display: inline-block;
  margin-top: 1.5em;
  padding: 12px 22px;
  background-color: #b7e4b7;
  color: #111;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  font-size: 18px;
}

/* Ajuste específico móvil */
@media (max-width: 600px) {
  .bloque h2 {
    font-size: 30px;
  }
  .bloque p {
    font-size: 18px;
  }
  .bloque a {
    font-size: 18px;
  }
}
</style>
</head>

<body>

<div class="bloque">
  <h2>✔ Pedido recibido</h2>

  <p>Gracias por su compra.</p>

  <p>Su pedido ha sido registrado correctamente y será tramitado en breve.</p>

  <p>Una vez verifiquemos el pago en BCH, procederemos al envío.</p>

  <a href="index.html">Volver</a>
</div>

</body>
</html>
