<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="utf-8">
<title>Comprar – La Venganza de Mercurio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="estilos.css">
<script defer>
document.addEventListener('DOMContentLoaded', () => {
  const qrContainer = document.getElementById('qr-container');
  const feedback = document.getElementById('feedbackQR');

  window.copiarDireccion = function() {
    navigator.clipboard.writeText("TU_DIRECCION_BCH");
    feedback.classList.add('visible');
    setTimeout(() => {
      feedback.classList.remove('visible');
    }, 2000);
  };
});
</script>
</head>

<body>

<div class="titulo-principal">
  Comprar el libro – La Venganza de Mercurio
</div>

<div class="bloque">
  <p><strong>1. Elija el formato</strong></p>
  <select id="formato" name="Formato" required>
    <option value="">Seleccione</option>
    <option value="ebook">eBook (5€)</option>
    <option value="blanda">Tapa blanda (17€)</option>
    <option value="dura">Tapa dura (20€)</option>
  </select>
</div>

<div class="bloque">
  <p><strong>2. Realice el pago</strong></p>
  <p>Escanee o copie la dirección BCH.</p>
</div>

<div class="boton-wrapper" id="qr-container">
  <div class="qr-boton" onclick="copiarDireccion()">
    <img src="img/QR-BCH.jpg" alt="QR BCH">
  </div>
  <div id="feedbackQR">Dirección copiada</div>
</div>

<form class="formulario"
      action="https://formsubmit.co/lavenganzademercurio@gmail.com"
      method="POST">
  <input type="hidden" name="_subject" value="Pedido - La Venganza de Mercurio">
  <input type="hidden" name="_captcha" value="false">
  <input type="hidden" name="_next" value="https://jarmatan.github.io/Pruebas/gracias.html">

  <label>Nombre</label>
  <input type="text" name="Nombre" required>

  <label>Email</label>
  <input type="email" name="Email" required>

  <div class="direccion-envio">
    <label>Dirección</label>
    <input type="text" name="Dirección">
    <label>Ciudad</label>
    <input type="text" name="Ciudad">
    <label>Provincia</label>
    <input type="text" name="Provincia">
    <label>Código postal</label>
    <input type="text" name="Código postal">
    <label>País</label>
    <input type="text" name="País">
    <label>Teléfono</label>
    <input type="text" name="Teléfono">
  </div>

  <button class="boton-formulario" type="submit">
    Enviar pedido
  </button>
</form>

</body>
</html>
