<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="utf-8">
<title>Comprar el libro – La Venganza de Mercurio<br>con Bitcoin Cash (BCH)</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Georgia, serif;
  margin: 0;
  padding: 0;
  background: url('portadaWEB.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #111;
}

.titulo-principal {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  margin: 2em auto 1em auto;
  color: #fff;
}

.bloque {
  background-color: rgba(240,240,240,0.9);
  margin: 1.2em auto;
  padding: 1.2em;
  border-radius: 12px;
  max-width: 600px;
}

.boton-wrapper {
  display: flex;
  justify-content: center;
  margin: 1em auto;
  background-color: rgba(200,200,200,0.9);
  border-radius: 14px;
  max-width: 260px;
  padding: 18px;
}

.qr-boton {
  max-width: 220px;
  background: linear-gradient(to bottom, #ffffff, #e4e4e4);
  border-radius: 14px;
  border: 1px solid #aaa;
  cursor: pointer;
  padding: 12px;
}

.qr-boton img {
  width: 100%;
}

.formulario {
  background-color: rgba(240,240,240,0.9);
  margin: 1.5em auto;
  padding: 1em;
  border-radius: 12px;
  max-width: 600px;
}

.formulario input,
.formulario select,
textarea {
  width: 100%;
  padding: 8px;
  box-sizing: border-box;
  background-color: #fff;
  transition: background-color 0.3s ease;
}

/* 🔴 CLAVE: eliminar verde automático */
input:valid,
input:invalid,
textarea:valid,
textarea:invalid {
  background-color: inherit !important;
  box-shadow: none !important;
}

textarea {
  height: 220px;
  margin: 10px 0;
}

.boton-formulario {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: linear-gradient(to bottom, #ffffff, #e4e4e4);
  border-radius: 14px;
  border: 1px solid #aaa;
  height: 70px;
  cursor: pointer;
}

.direccion-envio {
  display: none;
}
</style>

<script>
const PRECIOS = { ebook: 5, blanda: 17, dura: 20 };

const COLORES = {
  ebook: "#66cc66",
  blanda: "#3366ff",
  dura: "#ffcc33"
};

function colorActual() {
  const f = document.getElementById("formato").value;
  return COLORES[f] || null;
}

function actualizarCamposEnvio() {
  const f = document.getElementById("formato").value;

  document.getElementById("direccionEnvio").style.display =
    (f === "blanda" || f === "dura") ? "block" : "none";

  document.getElementById("formato").style.backgroundColor =
    f ? COLORES[f] : "#fff";

  actualizarColores();
}

function actualizarColores() {
  const color = colorActual();

  document.querySelectorAll(".formulario input, textarea").forEach(c => {
    if (c.value.trim() && color) {
      c.style.backgroundColor = color;
    } else {
      c.style.backgroundColor = "#fff";
    }
  });
}

function init() {
  document.querySelectorAll(".formulario input, textarea").forEach(c => {
    c.addEventListener("input", actualizarColores);
  });
}

window.onload = init;
</script>

</head>

<body>

<div class="titulo-principal">
Comprar el libro – La Venganza de Mercurio
</div>

<div class="bloque">
<select id="formato" onchange="actualizarCamposEnvio()">
  <option value="">Seleccione</option>
  <option value="ebook">eBook</option>
  <option value="blanda">Tapa blanda</option>
  <option value="dura">Tapa dura</option>
</select>
</div>

<div class="formulario">

<label>Nombre</label>
<input type="text">

<label>Email</label>
<input type="email">

<div id="direccionEnvio" class="direccion-envio">
<label>Dirección</label>
<input type="text">
</div>

<textarea></textarea>

<button class="boton-formulario">Generar pedido</button>
<button class="boton-formulario">Copiar pedido</button>

</div>

</body>
</html>
