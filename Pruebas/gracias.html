<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Pedido recibido</title>
<link rel="stylesheet" href="estilos.css">
<style>
/* Ajustes específicos para la página de gracias */
.bloque h2 {
  font-size: 32px; /* tamaño grande pero responsivo */
  text-align: center;
  margin-bottom: 1em;
}

.bloque p {
  font-size: 18px; /* tamaño legible en móvil y ordenador */
  line-height: 1.6;
  margin: 0.5em 0;
  text-align: center;
}

.bloque a {
  display: inline-block;
  margin-top: 1.5em;
  padding: 10px 20px;
  background-color: #b7e4b7;
  color: #111;
  text-decoration: none;
  border-radius: 12px;
  font-weight: bold;
  transition: background 0.2s ease;
}

.bloque a:hover {
  background-color: #90c890;
}

/* Ajuste responsive */
@media (max-width: 600px) {
  .bloque h2 {
    font-size: 26px;
  }
  .bloque p {
    font-size: 16px;
  }
  .bloque a {
    font-size: 16px;
    padding: 8px 16px;
  }
}
</style>
</head>

<body>

<div class="bloque">
  <h2>✔ Pedido recibido</h2>

  <p>Gracias por su compra.</p>

  <p>Su pedido ha sido registrado correctamente y será tramitado en breve.</p>

  <p>Una vez verifiquemos el pago en BCH, procederemos al envío.</p>

  <a href="index.html">Volver</a>
</div>

</body>
</html>
