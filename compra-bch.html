<!DOCTYPE html>
<html lang="es-ES">
<head>
<meta charset="utf-8">
<title>Comprar el libro – La Venganza de Mercurio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Georgia, serif;
  margin: 0;
  padding: 0;
  background: url('portadaWEB.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #111;
}

.titulo-principal {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  margin: 2em auto 1em auto;
  color: #fff;
}

.bloque {
  background-color: rgba(240,240,240,0.9);
  margin: 1.2em auto;
  padding: 1em;
  border-radius: 12px;
  max-width: 600px;
}

.qr-container {
  text-align: center;
  margin: 1em auto;
}

.qr-container img {
  width: 220px;
}

.formulario {
  background-color: rgba(240,240,240,0.9);
  margin: 1.5em auto;
  padding: 1em;
  border-radius: 12px;
  max-width: 600px;
}

.formulario input,
.formulario select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

textarea {
  width: 100%;
  height: 220px;
}

button {
  width: 100%;
  padding: 12px;
  font-size: 18px;
}

.direccion-envio {
  display: none;
}
</style>

<script>

const BCH_ADDRESS = "TU_DIRECCION_BCH_AQUI";
const EMAIL_CONTACTO = "lavenganzademercurio@gmail.com";

// ⚠️ CAMBIA ESTO SI QUIERES PRECIO REAL
const EUR_TO_BCH = 0.0025;

let precioEUR = 0;
let precioBCH = 0;

function generarPedidoID() {
  return 'MERC-' + Date.now();
}

function obtenerFechaHora() {
  const ahora = new Date();
  return ahora.toLocaleString();
}

function actualizarPrecio() {

  const formato = document.getElementById("formato").value;

  if(formato === "ebook") precioEUR = 5;
  if(formato === "blanda") precioEUR = 15;
  if(formato === "dura") precioEUR = 20;

  precioBCH = (precioEUR * EUR_TO_BCH).toFixed(6);

  document.getElementById("precioInfo").innerHTML =
    `<strong>${precioEUR} € ≈ ${precioBCH} BCH</strong><br>(Gastos de envío incluidos)`;

  generarQR();
}

function generarQR() {

  if(!precioBCH) return;

  const url = `bitcoincash:${BCH_ADDRESS}?amount=${precioBCH}`;

  const qr = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(url)}`;

  document.getElementById("qr").src = qr;
}

function actualizarCamposEnvio() {

  const formato = document.getElementById("formato").value;
  const envio = document.getElementById("direccionEnvio");

  envio.style.display = (formato === "blanda" || formato === "dura") ? "block" : "none";

  actualizarPrecio();
}

function generarMensaje() {

  const pedido = document.getElementById("pedidoInput").value;
  const fecha = document.getElementById("fechaPedido").value;

  const formato = document.getElementById("formato").value;
  const nombre = document.getElementById("nombre").value;
  const email = document.getElementById("email").value;

  const direccion = document.getElementById("direccion").value;
  const ciudad = document.getElementById("ciudad").value;
  const postal = document.getElementById("postal").value;
  const pais = document.getElementById("pais").value;

  let mensaje =
`Pedido libro "La Venganza de Mercurio"

ID:
${pedido}

Fecha y hora:
${fecha}

Formato:
${formato}

Precio:
${precioEUR} € ≈ ${precioBCH} BCH

Nombre:
${nombre}

Email:
${email}

`;

  if(formato === "blanda" || formato === "dura") {

    mensaje +=
`Dirección de envío:
${direccion}
${ciudad}
${postal}
${pais}

`;

  }

  mensaje += `Dirección BCH:
${BCH_ADDRESS}`;

  document.getElementById("mensajePedido").value = mensaje;
}

function copiarMensaje() {

  const texto = document.getElementById("mensajePedido");
  texto.select();
  document.execCommand("copy");

  alert("Mensaje copiado. Envíalo a: " + EMAIL_CONTACTO);
}

window.onload = function() {

  const pedidoID = generarPedidoID();
  const fecha = obtenerFechaHora();

  document.getElementById("pedidoID").innerText = pedidoID;
  document.getElementById("pedidoInput").value = pedidoID;
  document.getElementById("fechaPedido").value = fecha;

}

</script>

</head>

<body>

<div class="titulo-principal">
Comprar el libro – La Venganza de Mercurio
</div>

<div class="bloque">
<p>
Seleccione el formato. El precio en BCH se calculará automáticamente.<br><br>
Todos los precios incluyen gastos de envío.
</p>

<p id="precioInfo" style="text-align:center; font-size:20px;">
Seleccione formato
</p>

<p style="text-align:center; font-weight:bold;" id="pedidoID">
Cargando...
</p>

</div>

<div class="qr-container">
<img id="qr" src="" alt="QR BCH">
</div>

<div class="formulario">

<input type="hidden" id="pedidoInput">
<input type="hidden" id="fechaPedido">

<label>Formato</label>
<select id="formato" onchange="actualizarCamposEnvio()" required>
<option value="">Seleccione</option>
<option value="ebook">eBook (5€)</option>
<option value="blanda">Tapa blanda (15€)</option>
<option value="dura">Tapa dura (20€)</option>
</select>

<label>Nombre</label>
<input type="text" id="nombre">

<label>Email</label>
<input type="email" id="email">

<div id="direccionEnvio" class="direccion-envio">

<label>Dirección</label>
<input type="text" id="direccion">

<label>Ciudad</label>
<input type="text" id="ciudad">

<label>Código postal</label>
<input type="text" id="postal">

<label>País</label>
<input type="text" id="pais">

</div>

<button onclick="generarMensaje()">
Generar mensaje
</button>

<textarea id="mensajePedido"></textarea>

<button onclick="copiarMensaje()">
Copiar mensaje
</button>

</div>

</body>
</html>
